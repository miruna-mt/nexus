<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus · Optimización multi-industria</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <img src="/assets/logo.png" alt="Nexus" class="logo">
        </div>
        <p class="subtitle">Motor de optimización multi-industria</p>

        <!-- Selector de niveles -->
        <div class="level-selector">
            <button class="level-btn active" data-level="demo">⚡ Demo</button>
            <button class="level-btn" data-level="parametric">🔧 Paramétrico</button>
            <button class="level-btn" data-level="expert">📁 Experto</button>
        </div>

        <!-- Selectores de problema e instancia (siempre visibles) -->
        <div class="selector">
            <label for="problemType" style="font-style: italic; text-transform: none; font-weight: 400;">¿Qué problema te quita el sueño?</label>
            <select id="problemType">
                <option value="" disabled selected>Selecciona un tipo de problema</option>
                <option value="assignment">Asignación de recursos (Resource Allocation)</option>
                <option value="routing">Planificación de rutas (Routing & Scheduling)</option>
                <option value="inventory">Gestión de Inventario (Inventory Management)</option>
                <option value="portfolio">Optimización de carteras (Portfolio Optimization)</option>
                <option value="location">Localización (Facility Location)</option>
                <option value="stochastic">Optimización bajo incertidumbre (Stochastic Optimization)</option>
                <option value="scheduling">Secuenciación de proyectos (Project Scheduling)</option>
            </select>
        </div>

        <div class="selector">
            <label for="instance" style="font-style: italic; text-transform: none; font-weight: 400;">Pongamos números a esa pesadilla</label>
            <select id="instance">
                <option value="" disabled selected>Selecciona un escenario</option>
                <option value="fmcg_productos_tiendas">🛒 Supermercado · Productos a Tiendas</option>
                <option value="defense_missions">🎯 Defensa · Asignación de Misiones</option>
                <option value="cloud_vms">☁️ Cloud · Asignación de VMs</option>
            </select>
        </div>

        <!-- Contenedor dinámico para el contenido según nivel -->
        <div id="level-content" class="level-content">
            <!-- Aquí se inyectará el HTML de Demo/Paramétrico/Experto -->
        </div>

        <!-- Descripción del escenario (se mantiene) -->
        <div id="scenario-description" class="scenario-description">
            <!-- Las descripciones se cargarán dinámicamente desde config -->
        </div>

        <!-- Resultados -->
        <div id="results" class="results">
            <h3>Resultados</h3>
            <div id="output" class="output">Selecciona un escenario y nivel para comenzar</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
